version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:15-alpine\n    container_name: archisynapse-db\n    environment:\n      POSTGRES_USER: archisynapse\n      POSTGRES_PASSWORD: secure_password_change_me\n      POSTGRES_DB: archisynapse\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U archisynapse\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  redis:\n    image: redis:7-alpine\n    container_name: archisynapse-cache\n    command: redis-server --requirepass redis_password_change_me\n    ports:\n      - \"6379:6379\"\n    volumes:\n      - redis_data:/data\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  rabbitmq:\n    image: rabbitmq:3.12-management-alpine\n    container_name: archisynapse-queue\n    environment:\n      RABBITMQ_DEFAULT_USER: guest\n      RABBITMQ_DEFAULT_PASS: guest\n    ports:\n      - \"5672:5672\"\n      - \"15672:15672\"\n    volumes:\n      - rabbitmq_data:/var/lib/rabbitmq\n    healthcheck:\n      test: [\"CMD\", \"rabbitmq-diagnostics\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  api:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    container_name: archisynapse-api\n    environment:\n      NODE_ENV: development\n      API_PORT: 3000\n      DATABASE_URL: postgresql://archisynapse:secure_password_change_me@postgres:5432/archisynapse\n      REDIS_URL: redis://:redis_password_change_me@redis:6379\n      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672\n      JWT_SECRET: your_jwt_secret_change_me\n      API_KEY_SECRET: your_api_key_secret_change_me\n    ports:\n      - \"3000:3000\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n      redis:\n        condition: service_healthy\n      rabbitmq:\n        condition: service_healthy\n    volumes:\n      - ./src:/app/src\n    command: npm run dev\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:3000/health\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\nvolumes:\n  postgres_data:\n  redis_data:\n  rabbitmq_data:\n\nnetworks:\n  default:\n    name: archisynapse-network\n