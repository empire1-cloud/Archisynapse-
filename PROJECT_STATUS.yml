ci_cd_workflows:
  - name: "CI/CD Pipeline"
    file: ".github/workflows/ci-cd.yml"
    triggers: ["push", "pull_request"]
    jobs: ["test", "build", "deploy"]
  - name: "Security Scanning"
    file: ".github/workflows/security.yml"
    triggers: ["push", "pull_request", "schedule"]
    jobs: ["security", "dependency-check", "sast"]

deployment_environments:
  - name: "Local Development"
    stack: "Docker Compose"
    services: ["PostgreSQL", "Redis", "RabbitMQ", "API"]
  - name: "Staging"
    stack: "Kubernetes"
    services: ["PostgreSQL", "Redis", "RabbitMQ", "API", "Monitoring"]
  - name: "Production"
    stack: "Kubernetes (Multi-region)"
    services: ["PostgreSQL", "Redis", "RabbitMQ", "API", "Monitoring", "CDN"]
    regions: ["US-East", "Europe", "Asia"]

